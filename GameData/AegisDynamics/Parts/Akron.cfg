+PART[SSME]:FOR[AegisDynamics]
{
    @name = aegisAkron
    @title = Aegis Akron
    @manufacturer = Aegis Dynamics
    @description = Full-flow staged combustion methalox engine, designed to cluster. Inspired by Zenith from Stoke Space. Excellent atmospheric performance and thrust-to-weight ratio.

    @category = Engine
    @tags = engine rocket aegis akron stoke nova zenith methalox cluster booster

    @rescaleFactor = 0.5
    @mass = 0.9
    @cost = 18000
    @entryCost = 65000
    @TechRequired = heavyRocketry
    @attachRules = 1,1,1,1,0
    @bulkheadProfiles = srf, size0

    @maxTemp = 2000
    @emissiveConstant = 0.8

    !MODULE[FXModuleAnimateThrottle] {}
    !MODULE[ModuleTestSubject] {}

    @MODULE[ModuleEnginesFX]
    {
        @engineID = aegisAkronEngine
        @maxThrust = 125
        @heatProduction = 200
        @atmosphereCurve
        {
            @key,0 = 0 295
            @key,1 = 1 270
        }
    }

    @MODULE[ModuleGimbal]
    {
        @gimbalRange = 8
    }

    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = fuelMode
        switcherDescription = Fuel Type
        switcherDescriptionPlural = Fuel Types
        affectDragCubes = false
        affectFARVoxels = false

        SUBTYPE:NEEDS[CryoTanks]
        {
            name = Methalox
            title = Methalox (LCH4/Ox)
            primaryColor = #4488ff
            secondaryColor = #88aacc
            descriptionSummary = Liquid methane + oxidizer
            descriptionDetail = Default propellant. Designed for full-flow staged combustion methalox.

            MODULE
            {
                IDENTIFIER
                {
                    name = ModuleEnginesFX
                    engineID = aegisAkronEngine
                }
                DATA
                {
                    maxThrust = 200
                    PROPELLANT
                    {
                        name = LqdMethane
                        ratio = 3
                        DrawGauge = True
                    }
                    PROPELLANT
                    {
                        name = Oxidizer
                        ratio = 1
                    }
                    atmosphereCurve
                    {
                        key = 0 320
                        key = 1 295
                    }
                }
            }

            MODULE:NEEDS[Waterfall]
            {
                IDENTIFIER
                {
                    name = ModuleWaterfallFX
                }
                DATA
                {
                    TEMPLATE
                    {
                        templateName = stock-methalox-lower-1
                        overrideParentTransform = thrustTransform
                        position = 0, 0, 0
                        rotation = 0, 0, 0
                        scale = 0.5, 0.5, 0.5
                    }
                }
            }
        }

        SUBTYPE
        {
            name = Kerolox
            title = Kerolox (LF/Ox)
            primaryColor = #d9a460
            secondaryColor = #999999
            descriptionSummary = Standard kerosene + oxidizer
            descriptionDetail = Stockalike LF/Ox alternative. Lower Isp than methalox but compatible with all stock tanks.

            MODULE
            {
                IDENTIFIER
                {
                    name = ModuleEnginesFX
                    engineID = aegisAkronEngine
                }
                DATA
                {
                    maxThrust = 150
                    PROPELLANT
                    {
                        name = LiquidFuel
                        ratio = 0.9
                        DrawGauge = True
                    }
                    PROPELLANT
                    {
                        name = Oxidizer
                        ratio = 1.1
                    }
                    atmosphereCurve
                    {
                        key = 0 295
                        key = 1 270
                    }
                }
            }

            MODULE:NEEDS[Waterfall]
            {
                IDENTIFIER
                {
                    name = ModuleWaterfallFX
                }
                DATA
                {
                    TEMPLATE
                    {
                        templateName = stock-kerolox-lower-1
                        overrideParentTransform = thrustTransform
                        position = 0, 0, 0
                        rotation = 0, 0, 0
                        scale = 0.5, 0.5, 0.5
                    }
                }
            }
        }

        SUBTYPE:NEEDS[CryoTanks]
        {
            name = Hydrolox
            title = Hydrolox (LH2/Ox)
            primaryColor = #66ccff
            secondaryColor = #aaeeff
            descriptionSummary = Liquid hydrogen + oxidizer
            descriptionDetail = Highest Isp option, but with lower thrust due to lower LH2 density.

            MODULE
            {
                IDENTIFIER
                {
                    name = ModuleEnginesFX
                    engineID = aegisAkronEngine
                }
                DATA
                {
                    maxThrust = 125
                    PROPELLANT
                    {
                        name = LqdHydrogen
                        ratio = 15
                        DrawGauge = True
                    }
                    PROPELLANT
                    {
                        name = Oxidizer
                        ratio = 1
                    }
                    atmosphereCurve
                    {
                        key = 0 380
                        key = 1 320
                    }
                }
            }

            MODULE:NEEDS[Waterfall]
            {
                IDENTIFIER
                {
                    name = ModuleWaterfallFX
                }
                DATA
                {
                    TEMPLATE
                    {
                        templateName = stock-hydrolox-lower-1
                        overrideParentTransform = thrustTransform
                        position = 0, 0, 0
                        rotation = 0, 0, 0
                        scale = 0.5, 0.5, 0.5
                    }
                }
            }
        }
    }

    MODULE:NEEDS[Waterfall]
    {
        name = ModuleWaterfallFX
        moduleID = aegisAkronFX
        engineID = aegisAkronEngine
        CONTROLLER
        {
            name = throttle
            linkedTo = throttle
            engineID = aegisAkronEngine
            responseRateUp = 10
            responseRateDown = 15
        }
        CONTROLLER
        {
            name = atmosphereDepth
            linkedTo = atmosphere_density
        }
        TEMPLATE
        {
            templateName = stock-methalox-lower-1
            overrideParentTransform = thrustTransform
            position = 0, 0, 0
            rotation = 0, 0, 0
            scale = 0.5, 0.5, 0.5
        }
    }

    MODULE
    {
        name = TweakScale
        type = stack
        defaultScale = 0.625
        scaleFactors = 0.625, 1.25, 1.875, 2.5
        scaleNames = 0.625m, 1.25m, 1.875m, 2.5m
    }
}